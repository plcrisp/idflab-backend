version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: idflab_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: idflab_redis
    ports:
      - "6379:6379"
