version: "3.9"

services:
  api:
    build: .
    container_name: idflab_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    container_name: idflab_worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - db

  db:
    image: timescale/timescaledb:latest-pg15
    container_name: idflab_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: idflab_redis
    ports:
      - "6379:6379"
